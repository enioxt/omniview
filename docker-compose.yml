services:
  engine:
    build:
      context: .
      dockerfile: deploy/Dockerfile.engine
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/omniview.db
      - STORAGE_PATH=/app/storage
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  ui:
    build:
      context: .
      dockerfile: deploy/Dockerfile.ui
    ports:
      - "80:80"
    depends_on:
      engine:
        condition: service_healthy
    restart: unless-stopped

volumes:
  data:
